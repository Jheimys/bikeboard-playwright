name: E2E Tests
on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on (chromium, firefox, webkit)'
        required: true
        default: 'chromium'
 # push:
 #  branches: [ main, master ]
 # pull_request:
 #   branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22


    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ github.event.inputs.browser }}
      #run: npx playwright install --with-deps


    - name: Run E2E tests
      run: npx playwright test --project=${{ github.event.inputs.browser }} 
      #run: npx playwright test

    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ github.event.inputs.browser }}
        path: playwright-report/
        retention-days: 30